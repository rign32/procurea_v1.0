name: Deploy Production

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.claude/**'
      - 'Dokumenty/**'
      - 'LICENSE'
      - '.gitignore'

# Production deploys are queued (cancel-in-progress: false) — every merged
# commit on main must deploy, even if another is already in flight.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Fast-fail before heavy deploy. Any lint/tsc error that slipped through
  # staging (rare but happens) trips here at ~2 min instead of mid-deploy.
  quick-check:
    name: Quick check (typecheck + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc -b
      - name: Lint (blocking)
        working-directory: frontend
        run: npm run lint

  deploy:
    name: Build (parallel) & Deploy to Production
    needs: quick-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            admin-frontend/package-lock.json
            landing/package-lock.json

      # Parallel npm ci across all 4 projects.
      - name: Install deps (parallel)
        run: |
          set -e
          (cd backend && npm ci) & BE=$!
          (cd frontend && npm ci) & FE=$!
          (cd admin-frontend && npm ci) & AF=$!
          (cd landing && npm ci) & LD=$!
          FAIL=0
          wait $BE || { echo "::error::backend npm ci failed"; FAIL=1; }
          wait $FE || { echo "::error::frontend npm ci failed"; FAIL=1; }
          wait $AF || { echo "::error::admin-frontend npm ci failed"; FAIL=1; }
          wait $LD || { echo "::error::landing npm ci failed"; FAIL=1; }
          exit $FAIL

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      # Last-line-of-defense drift guard. Staging runs the same check; this one
      # catches anything that slipped through (direct-to-main pushes, bypassed staging).
      - name: Guard — schema change requires migration
        working-directory: backend
        run: |
          BASE=$(git rev-parse HEAD~1)
          SCHEMA_CHANGED=$(git diff --name-only "$BASE"..HEAD -- prisma/schema.prisma | wc -l | tr -d ' ')
          MIGRATIONS_ADDED=$(git diff --name-only --diff-filter=A "$BASE"..HEAD -- 'prisma/migrations/*/migration.sql' | wc -l | tr -d ' ')
          echo "schema.prisma changed in last commit: $SCHEMA_CHANGED files; new migrations added: $MIGRATIONS_ADDED"
          if [ "$SCHEMA_CHANGED" != "0" ] && [ "$MIGRATIONS_ADDED" = "0" ]; then
            echo "::error::schema.prisma changed in the last commit merged to main but no new migration. Prod deploy blocked."
            exit 1
          fi

      # Retry on transient connection-pool exhaustion (same issue as staging).
      # Cloud SQL `max_connections` is shared with the running Cloud Function;
      # if a function instance is mid-warmup and holding connections, migrate
      # may fail to grab a slot. Backing off lets connections drain.
      - name: Run database migrations (with retry)
        working-directory: backend
        run: |
          for i in 1 2 3 4; do
            if npx prisma migrate deploy; then
              exit 0
            fi
            if [ $i -eq 4 ]; then
              echo "::error::Migration failed after 4 attempts. Check Cloud SQL max_connections or stuck queries."
              exit 1
            fi
            WAIT=$((i * 20))
            echo "Migration attempt $i/4 failed. Retrying in ${WAIT}s…"
            sleep $WAIT
          done
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify no pending migrations
        working-directory: backend
        run: |
          STATUS=$(npx prisma migrate status 2>&1)
          echo "$STATUS"
          if echo "$STATUS" | grep -q "not yet been applied"; then
            echo "::error::Pending migrations remain after deploy!"
            exit 1
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Parallel builds — backend + frontend PL/EN + admin-frontend + landing PL/EN.
      - name: Build all (parallel)
        run: |
          set +e
          mkdir -p /tmp/build-logs
          (cd backend && npm test -- --passWithNoTests && npm run build) > /tmp/build-logs/backend.log 2>&1 &
          BE=$!
          (cd frontend && npm run build && npm run build:en) > /tmp/build-logs/frontend.log 2>&1 &
          FE=$!
          (cd admin-frontend && npm run build) > /tmp/build-logs/admin.log 2>&1 &
          AF=$!
          (cd landing && npm run build && npm run build:en) > /tmp/build-logs/landing.log 2>&1 &
          LD=$!
          FAIL=0
          wait $BE; BE_RC=$?
          wait $FE; FE_RC=$?
          wait $AF; AF_RC=$?
          wait $LD; LD_RC=$?
          echo "===== backend build (rc=$BE_RC) ====="
          cat /tmp/build-logs/backend.log
          echo "===== frontend build (rc=$FE_RC) ====="
          cat /tmp/build-logs/frontend.log
          echo "===== admin-frontend build (rc=$AF_RC) ====="
          cat /tmp/build-logs/admin.log
          echo "===== landing build (rc=$LD_RC) ====="
          cat /tmp/build-logs/landing.log
          [ $BE_RC -ne 0 ] && { echo "::error::backend build failed"; FAIL=1; }
          [ $FE_RC -ne 0 ] && { echo "::error::frontend build failed"; FAIL=1; }
          [ $AF_RC -ne 0 ] && { echo "::error::admin-frontend build failed"; FAIL=1; }
          [ $LD_RC -ne 0 ] && { echo "::error::landing build failed"; FAIL=1; }
          exit $FAIL

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy app, admin, landing, and Cloud Functions
        run: |
          firebase deploy \
            --only hosting:app,hosting:app-en,hosting:admin,hosting:landing,hosting:landing-en,functions:api \
            --token "$FIREBASE_TOKEN" \
            --project project-c64b9be9-1d92-4bc6-be7 \
            --non-interactive \
            --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Post-deploy smoke test
        working-directory: backend
        run: |
          sleep 15
          BASE_URL=https://app.procurea.pl node scripts/smoke-staging.cjs
