name: Deploy Production

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.claude/**'
      - 'Dokumenty/**'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git-based drift check

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            admin-frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      # Last-line-of-defense drift guard. Staging CI runs the same check; this one
      # catches anything that slipped through (direct-to-main pushes, bypassed staging).
      # See deploy-staging.yml for the full rationale.
      - name: Guard — schema change requires migration
        working-directory: backend
        run: |
          BASE=$(git rev-parse HEAD~1)
          SCHEMA_CHANGED=$(git diff --name-only "$BASE"..HEAD -- prisma/schema.prisma | wc -l | tr -d ' ')
          MIGRATIONS_ADDED=$(git diff --name-only --diff-filter=A "$BASE"..HEAD -- 'prisma/migrations/*/migration.sql' | wc -l | tr -d ' ')
          echo "schema.prisma changed in last commit: $SCHEMA_CHANGED files; new migrations added: $MIGRATIONS_ADDED"
          if [ "$SCHEMA_CHANGED" != "0" ] && [ "$MIGRATIONS_ADDED" = "0" ]; then
            echo "::error::schema.prisma changed in the last commit merged to main but no new migration. Prod deploy blocked."
            exit 1
          fi

      - name: Run database migrations
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify no pending migrations
        working-directory: backend
        run: |
          STATUS=$(npx prisma migrate status 2>&1)
          echo "$STATUS"
          if echo "$STATUS" | grep -q "not yet been applied"; then
            echo "::error::Pending migrations remain after deploy!"
            exit 1
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Backend tests
        working-directory: backend
        run: npm test -- --passWithNoTests

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend type check
        working-directory: frontend
        run: npx tsc -b

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend PL (production)
        working-directory: frontend
        run: npm run build

      - name: Build frontend EN (production)
        working-directory: frontend
        run: npm run build:en

      - name: Install admin-frontend dependencies
        working-directory: admin-frontend
        run: npm ci

      - name: Build admin-frontend
        working-directory: admin-frontend
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy app and Cloud Functions
        run: |
          firebase deploy \
            --only hosting:app,hosting:app-en,hosting:admin,functions:api \
            --token "$FIREBASE_TOKEN" \
            --project project-c64b9be9-1d92-4bc6-be7 \
            --non-interactive \
            --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Post-deploy health check
        run: |
          sleep 15
          curl -sf https://app.procurea.pl/api/health/ping || echo "⚠️ Health ping failed — backend may still be warming up"
          SCHEMA_STATUS=$(curl -sf https://app.procurea.pl/api/health/db-schema 2>/dev/null || echo '{"status":"unreachable"}')
          echo "Schema check: $SCHEMA_STATUS"
          if echo "$SCHEMA_STATUS" | grep -q '"status":"drift"'; then
            echo "::warning::Database schema drift detected — pending migrations exist!"
          fi

      - name: Install landing dependencies
        working-directory: landing
        run: npm ci
        continue-on-error: true

      - name: Build and deploy landing
        continue-on-error: true
        run: |
          cd landing && npm run build && npm run build:en && cd ..
          firebase deploy \
            --only hosting:landing,hosting:landing-en \
            --token "$FIREBASE_TOKEN" \
            --project project-c64b9be9-1d92-4bc6-be7 \
            --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
