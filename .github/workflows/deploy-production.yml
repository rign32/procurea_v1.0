name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Backend tests
        working-directory: backend
        run: npm test -- --passWithNoTests
        continue-on-error: true

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend type check
        working-directory: frontend
        run: npx tsc -b

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Build frontend PL (production)
        working-directory: frontend
        run: npm run build

      - name: Build frontend EN (production)
        working-directory: frontend
        run: npm run build:en

      - name: Install landing dependencies
        working-directory: landing
        run: npm ci

      - name: Build landing PL
        working-directory: landing
        run: npm run build

      - name: Build landing EN
        working-directory: landing
        run: npm run build:en

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy all hosting targets and Cloud Functions
        run: |
          firebase deploy \
            --only hosting:app,hosting:app-en,hosting:landing,hosting:landing-en,functions:api \
            --token "$FIREBASE_TOKEN" \
            --project project-c64b9be9-1d92-4bc6-be7 \
            --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
