name: Deploy Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git-based drift check

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            landing/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      # Guards against the class of bug where schema.prisma gets new fields/models
      # without a matching migration/*.sql file. `prisma db push` creates columns
      # silently on staging DB, so staging works but prod breaks (migrate deploy
      # sees no new migration → missing columns → P2022 on every query, as happened
      # 2026-04-20 with Organization.hasConnectAddon blocking all logins).
      #
      # Heuristic: if any commit on this branch (vs main) modifies schema.prisma,
      # there must be at least one NEW migration file under prisma/migrations/.
      - name: Guard — schema change requires migration
        working-directory: backend
        run: |
          BASE=$(git merge-base HEAD origin/main 2>/dev/null || echo "HEAD~10")
          SCHEMA_CHANGED=$(git diff --name-only "$BASE"..HEAD -- prisma/schema.prisma | wc -l | tr -d ' ')
          MIGRATIONS_ADDED=$(git diff --name-only --diff-filter=A "$BASE"..HEAD -- 'prisma/migrations/*/migration.sql' | wc -l | tr -d ' ')
          echo "schema.prisma changed: $SCHEMA_CHANGED files; new migrations added: $MIGRATIONS_ADDED"
          if [ "$SCHEMA_CHANGED" != "0" ] && [ "$MIGRATIONS_ADDED" = "0" ]; then
            echo "::error::schema.prisma changed but no new migration added. Run \`npx prisma migrate dev --name <change>\` locally, commit the generated migration, and push again. Never use \`prisma db push\` on staging — it creates silent drift that breaks prod."
            exit 1
          fi

      - name: Run database migrations
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}

      - name: Backend tests
        working-directory: backend
        run: npm test -- --passWithNoTests

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend type check
        working-directory: frontend
        run: npx tsc -b

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint || echo "::warning::Frontend lint has errors — fix before production deploy"
        continue-on-error: true

      - name: Build frontend PL (staging)
        working-directory: frontend
        run: npm run build:staging
        env:
          VITE_STAGING_SECRET: ${{ secrets.VITE_STAGING_SECRET }}

      - name: Build frontend EN (staging)
        working-directory: frontend
        run: npm run build:staging-en
        env:
          VITE_STAGING_SECRET: ${{ secrets.VITE_STAGING_SECRET }}

      - name: Install landing dependencies
        working-directory: landing
        run: npm ci

      - name: Build landing PL (staging)
        working-directory: landing
        run: npm run build:staging

      - name: Build landing EN (staging)
        working-directory: landing
        run: npm run build:staging-en

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy staging
        run: |
          firebase deploy \
            --only hosting:app-staging,hosting:app-staging-en,hosting:landing-staging,hosting:landing-staging-en,functions:apiStaging \
            --token "$FIREBASE_TOKEN" \
            --project project-c64b9be9-1d92-4bc6-be7 \
            --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Post-deploy health check
        run: |
          sleep 10
          curl -sf https://procurea-app-staging.web.app/api/health/ping || echo "⚠️ Health check failed — backend may still be warming up"
