name: Deploy Staging

on:
  push:
    branches: [staging]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.claude/**'
      - 'Dokumenty/**'
      - 'LICENSE'
      - '.gitignore'

# cancel-in-progress: true — with ~10 parallel Claude sessions pushing to staging,
# only the latest commit matters for deploy. Intermediate runs are noise.
concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  # Fast-fail gate. TypeScript + lint errors fail here in ~2 min instead of
  # burning 10 min on a full build that never deploys.
  # Lint is enforced (no continue-on-error) — it used to slip through to main,
  # where it IS blocking, causing red prod CI (see 2026-04-21 history).
  quick-check:
    name: Quick check (typecheck + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc -b
      - name: Lint (blocking)
        working-directory: frontend
        run: npm run lint

  # Backend E2E integration tests against a throwaway PostgreSQL.
  # Covers RFQ CRUD, offer flow, portal security, and tenant isolation
  # (org A must never see org B data). Blocking for deploy — a multi-tenant
  # regression cannot reach staging.
  e2e-tests:
    name: E2E backend tests
    needs: quick-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: procurea_e2e_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/procurea_e2e_test
      JWT_SECRET: e2e-ci-test-secret-not-used-in-prod
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      - name: Push schema to e2e DB
        working-directory: backend
        # `db push` instead of `migrate deploy` — migration history has historical
        # drift where 20260310120000_add_trial_credits references columns not yet
        # created by earlier migrations. For a throwaway E2E DB we only care that
        # the final schema matches, not that every migration replays cleanly.
        run: npx prisma db push --skip-generate --accept-data-loss
      - name: Run E2E tests
        working-directory: backend
        run: npm run test:e2e

  deploy:
    name: Build (parallel) & Deploy to Staging
    needs: [quick-check, e2e-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git-based drift check

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            landing/package-lock.json

      # Parallel npm ci — 3 installs in parallel instead of serial (~2x faster).
      - name: Install deps (parallel)
        run: |
          set -e
          (cd backend && npm ci) & BE=$!
          (cd frontend && npm ci) & FE=$!
          (cd landing && npm ci) & LD=$!
          FAIL=0
          wait $BE || { echo "::error::backend npm ci failed"; FAIL=1; }
          wait $FE || { echo "::error::frontend npm ci failed"; FAIL=1; }
          wait $LD || { echo "::error::landing npm ci failed"; FAIL=1; }
          exit $FAIL

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      # Guards against schema.prisma changes without a matching migration file.
      # `prisma db push` creates columns silently on staging DB while `migrate deploy`
      # sees no migration → prod breaks (incident 2026-04-20 with hasConnectAddon).
      - name: Guard — schema change requires migration
        working-directory: backend
        run: |
          BASE=$(git merge-base HEAD origin/main 2>/dev/null || echo "HEAD~10")
          SCHEMA_CHANGED=$(git diff --name-only "$BASE"..HEAD -- prisma/schema.prisma | wc -l | tr -d ' ')
          MIGRATIONS_ADDED=$(git diff --name-only --diff-filter=A "$BASE"..HEAD -- 'prisma/migrations/*/migration.sql' | wc -l | tr -d ' ')
          echo "schema.prisma changed: $SCHEMA_CHANGED files; new migrations added: $MIGRATIONS_ADDED"
          if [ "$SCHEMA_CHANGED" != "0" ] && [ "$MIGRATIONS_ADDED" = "0" ]; then
            echo "::error::schema.prisma changed but no new migration added. Run \`npx prisma migrate dev --name <change>\` locally, commit the generated migration, and push again."
            exit 1
          fi

      - name: Run database migrations
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}

      # Parallel builds — backend test+build, frontend PL+EN, landing PL+EN all at once.
      # Logs are captured separately so failures are readable. Runner has 4 vCPU
      # so 3 parallel builds fit comfortably.
      - name: Build all (parallel)
        env:
          VITE_STAGING_SECRET: ${{ secrets.VITE_STAGING_SECRET }}
        run: |
          set +e
          mkdir -p /tmp/build-logs
          (cd backend && npm test -- --passWithNoTests && npm run build) > /tmp/build-logs/backend.log 2>&1 &
          BE=$!
          (cd frontend && npm run build:staging && npm run build:staging-en) > /tmp/build-logs/frontend.log 2>&1 &
          FE=$!
          (cd landing && npm run build:staging && npm run build:staging-en) > /tmp/build-logs/landing.log 2>&1 &
          LD=$!
          FAIL=0
          wait $BE; BE_RC=$?
          wait $FE; FE_RC=$?
          wait $LD; LD_RC=$?
          echo "===== backend build (rc=$BE_RC) ====="
          cat /tmp/build-logs/backend.log
          echo "===== frontend build (rc=$FE_RC) ====="
          cat /tmp/build-logs/frontend.log
          echo "===== landing build (rc=$LD_RC) ====="
          cat /tmp/build-logs/landing.log
          [ $BE_RC -ne 0 ] && { echo "::error::backend build failed"; FAIL=1; }
          [ $FE_RC -ne 0 ] && { echo "::error::frontend build failed"; FAIL=1; }
          [ $LD_RC -ne 0 ] && { echo "::error::landing build failed"; FAIL=1; }
          exit $FAIL

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy staging
        run: |
          firebase deploy \
            --only hosting:app-staging,hosting:app-staging-en,hosting:landing-staging,hosting:landing-staging-en,functions:apiStaging \
            --token "$FIREBASE_TOKEN" \
            --project project-c64b9be9-1d92-4bc6-be7 \
            --non-interactive \
            --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Post-deploy smoke test
        working-directory: backend
        run: |
          sleep 10
          BASE_URL=https://procurea-app-staging.web.app node scripts/smoke-staging.cjs
