version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: procurea-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: procurea
      POSTGRES_USER: procurea
      POSTGRES_PASSWORD: procurea-dev-2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procurea"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
